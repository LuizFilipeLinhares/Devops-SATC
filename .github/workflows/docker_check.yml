name: Docker Check CI

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker image
        run: docker build -t linharesluiz/satc-devops:0.0.1 .

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=LuizFilipeLinhares_Devops-SATC
            -Dsonar.organization=luizfilipelinhares
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        run: |
          if [ -f trivy-results.json ]; then
            VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' trivy-results.json)
            echo "Vulnerabilidades críticas/altas: $VULN_COUNT"

            if [ "$VULN_COUNT" -gt 5 ]; then
              echo "Pipeline bloqueada: muitas vulnerabilidades críticas."
              exit 1
            fi
          else
            echo "Arquivo de resultados do Trivy nao encontrado."
            exit 1
          fi

      - name: Validar vulnerabilidades no SonarCloud
        run: |
          COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=LuizFilipeLinhares_Devops-SATC&types=VULNERABILITY&severities=CRITICAL&resolved=false&ps=1" \
            | jq '.total')

          echo "Vulnerabilidades críticas no Sonar: $COUNT"

          if [ "$COUNT" -gt 5 ]; then
            echo "Pipeline bloqueada: muitas vulnerabilidades críticas."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}